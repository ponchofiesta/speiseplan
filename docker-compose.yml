version: "3.8"

services:
  speiseplan:
    # Für lokales Build:
    # build: .
    # Für GitHub Packages (ersetze USERNAME mit deinem GitHub-Nutzernamen):
    image: ghcr.io/USERNAME/speiseplan:latest
    container_name: speiseplan-service
    ports:
      - "5123:5123"
    restart: unless-stopped
    volumes:
      # Cache persistent speichern
      - speiseplan_cache:/app/cache
      # PDFs persistent speichern
      - speiseplan_pdfs:/app/pdf_speiseplaene
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5123/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  speiseplan_cache:
  speiseplan_pdfs:
