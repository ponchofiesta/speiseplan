        {% if menu and menu.montag and menu.montag.gerichte %}
        **🍽️ Hauptgericht**
        {% for g in menu.montag.gerichte %}- {{ g }}
        {% endfor %}
        {% if menu.montag.desserts and menu.montag.desserts | length > 0 %}
