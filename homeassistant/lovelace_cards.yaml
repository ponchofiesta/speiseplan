# Lovelace Dashboard Karten für den Speiseplan
# Diese können direkt im Dashboard-Editor eingefügt werden

# ============================================================
# EMPFOHLENE KARTE: Übersichtliche Wochendarstellung mit Desserts
# ============================================================
week_card_with_desserts:
  type: markdown
  title: 📅 Speiseplan KW {{ state_attr('sensor.speiseplan_woche', 'kw') }}
  content: |
    {% set menu = state_attr('sensor.speiseplan_woche', 'menu') %}

    {% if menu %}
    ---
    ### 🔵 Montag
    {% if menu.montag and menu.montag.gerichte %}
    🍽️ **Hauptgericht:**
    {% for gericht in menu.montag.gerichte %}
    - {{ gericht }}
    {% endfor %}
    {% endif %}
    {% if menu.montag and menu.montag.desserts and menu.montag.desserts | length > 0 %}
    🍨 **Vorspeise/Dessert:**
    {% for dessert in menu.montag.desserts %}
    - {{ dessert }}
    {% endfor %}
    {% endif %}
    {% if not menu.montag or (not menu.montag.gerichte and not menu.montag.desserts) %}
    _Kein Menü_
    {% endif %}

    ---
    ### 🟢 Dienstag
    {% if menu.dienstag and menu.dienstag.gerichte %}
    🍽️ **Hauptgericht:**
    {% for gericht in menu.dienstag.gerichte %}
    - {{ gericht }}
    {% endfor %}
    {% endif %}
    {% if menu.dienstag and menu.dienstag.desserts and menu.dienstag.desserts | length > 0 %}
    🍨 **Vorspeise/Dessert:**
    {% for dessert in menu.dienstag.desserts %}
    - {{ dessert }}
    {% endfor %}
    {% endif %}
    {% if not menu.dienstag or (not menu.dienstag.gerichte and not menu.dienstag.desserts) %}
    _Kein Menü_
    {% endif %}

    ---
    ### 🟡 Mittwoch
    {% if menu.mittwoch and menu.mittwoch.gerichte %}
    🍽️ **Hauptgericht:**
    {% for gericht in menu.mittwoch.gerichte %}
    - {{ gericht }}
    {% endfor %}
    {% endif %}
    {% if menu.mittwoch and menu.mittwoch.desserts and menu.mittwoch.desserts | length > 0 %}
    🍨 **Vorspeise/Dessert:**
    {% for dessert in menu.mittwoch.desserts %}
    - {{ dessert }}
    {% endfor %}
    {% endif %}
    {% if not menu.mittwoch or (not menu.mittwoch.gerichte and not menu.mittwoch.desserts) %}
    _Kein Menü_
    {% endif %}

    ---
    ### 🟠 Donnerstag
    {% if menu.donnerstag and menu.donnerstag.gerichte %}
    🍽️ **Hauptgericht:**
    {% for gericht in menu.donnerstag.gerichte %}
    - {{ gericht }}
    {% endfor %}
    {% endif %}
    {% if menu.donnerstag and menu.donnerstag.desserts and menu.donnerstag.desserts | length > 0 %}
    🍨 **Vorspeise/Dessert:**
    {% for dessert in menu.donnerstag.desserts %}
    - {{ dessert }}
    {% endfor %}
    {% endif %}
    {% if not menu.donnerstag or (not menu.donnerstag.gerichte and not menu.donnerstag.desserts) %}
    _Kein Menü_
    {% endif %}

    ---
    ### 🔴 Freitag
    {% if menu.freitag and menu.freitag.gerichte %}
    🍽️ **Hauptgericht:**
    {% for gericht in menu.freitag.gerichte %}
    - {{ gericht }}
    {% endfor %}
    {% endif %}
    {% if menu.freitag and menu.freitag.desserts and menu.freitag.desserts | length > 0 %}
    🍨 **Vorspeise/Dessert:**
    {% for dessert in menu.freitag.desserts %}
    - {{ dessert }}
    {% endfor %}
    {% endif %}
    {% if not menu.freitag or (not menu.freitag.gerichte and not menu.freitag.desserts) %}
    _Kein Menü_
    {% endif %}

    ---
    _Zuletzt aktualisiert: {{ state_attr('sensor.speiseplan_woche', 'updated')[:16] | replace('T', ' ') }}_
    {% else %}
    ⚠️ Speiseplan nicht verfügbar
    {% endif %}

# ============================================================
# Karte für das heutige Menü (mit Desserts)
# ============================================================
today_card:
  type: markdown
  title: 🍴 Heute gibt es
  content: |
    {% set gerichte = state_attr('sensor.speiseplan_heute', 'gerichte') %}
    {% set desserts = state_attr('sensor.speiseplan_heute', 'desserts') %}
    {% set message = state_attr('sensor.speiseplan_heute', 'message') %}
    {% set error = state_attr('sensor.speiseplan_heute', 'error') %}

    {% if error %}
    ⚠️ {{ error }}
    {% elif message %}
    ℹ️ {{ message }}
    {% elif gerichte and gerichte | length > 0 %}
    🍽️ **Hauptgericht:**
    {% for gericht in gerichte %}
    - {{ gericht }}
    {% endfor %}

    {% if desserts and desserts | length > 0 %}
    🍨 **Vorspeise/Dessert:**
    {% for dessert in desserts %}
    - {{ dessert }}
    {% endfor %}
    {% endif %}
    {% else %}
    Kein Menü für heute verfügbar
    {% endif %}

# ============================================================
# Kompakte Tages-Karten (Vertical Stack)
# ============================================================
compact_day_cards:
  type: vertical-stack
  cards:
    - type: markdown
      title: 🔵 Montag
      content: |
        {% set menu = state_attr('sensor.speiseplan_woche', 'menu') %}
        {% if menu and menu.montag %}
        {% if menu.montag.gerichte %}{% for g in menu.montag.gerichte %}• {{ g }}
        {% endfor %}{% endif %}
        {% if menu.montag.desserts and menu.montag.desserts | length > 0 %}🍨 {% for d in menu.montag.desserts %}{{ d }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
        {% else %}_-_{% endif %}

    - type: markdown
      title: 🟢 Dienstag
      content: |
        {% set menu = state_attr('sensor.speiseplan_woche', 'menu') %}
        {% if menu and menu.dienstag %}
        {% if menu.dienstag.gerichte %}{% for g in menu.dienstag.gerichte %}• {{ g }}
        {% endfor %}{% endif %}
        {% if menu.dienstag.desserts and menu.dienstag.desserts | length > 0 %}🍨 {% for d in menu.dienstag.desserts %}{{ d }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
        {% else %}_-_{% endif %}

    - type: markdown
      title: 🟡 Mittwoch
      content: |
        {% set menu = state_attr('sensor.speiseplan_woche', 'menu') %}
        {% if menu and menu.mittwoch %}
        {% if menu.mittwoch.gerichte %}{% for g in menu.mittwoch.gerichte %}• {{ g }}
        {% endfor %}{% endif %}
        {% if menu.mittwoch.desserts and menu.mittwoch.desserts | length > 0 %}🍨 {% for d in menu.mittwoch.desserts %}{{ d }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
        {% else %}_-_{% endif %}

    - type: markdown
      title: 🟠 Donnerstag
      content: |
        {% set menu = state_attr('sensor.speiseplan_woche', 'menu') %}
        {% if menu and menu.donnerstag %}
        {% if menu.donnerstag.gerichte %}{% for g in menu.donnerstag.gerichte %}• {{ g }}
        {% endfor %}{% endif %}
        {% if menu.donnerstag.desserts and menu.donnerstag.desserts | length > 0 %}🍨 {% for d in menu.donnerstag.desserts %}{{ d }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
        {% else %}_-_{% endif %}

    - type: markdown
      title: 🔴 Freitag
      content: |
        {% set menu = state_attr('sensor.speiseplan_woche', 'menu') %}
        {% if menu and menu.freitag %}
        {% if menu.freitag.gerichte %}{% for g in menu.freitag.gerichte %}• {{ g }}
        {% endfor %}{% endif %}
        {% if menu.freitag.desserts and menu.freitag.desserts | length > 0 %}🍨 {% for d in menu.freitag.desserts %}{{ d }}{% if not loop.last %}, {% endif %}{% endfor %}{% endif %}
        {% else %}_-_{% endif %}

